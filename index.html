<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preventiva 360 - Em Manutenção</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #050B14;
      --card-bg: rgba(10, 22, 44, 0.4);
      --card-border: rgba(0, 210, 255, 0.15);
      --accent-color: #00d2ff;
      --text-main: #f8fafc;
      --text-sub: #94a3b8;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(0, 210, 255, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(0, 210, 255, 0.05) 0%, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 20px;
    }

    /* Animated background grid */
    .grid-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 540px;
      width: 100%;
      text-align: center;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .icon-wrapper {
      position: relative;
      width: 96px;
      height: 96px;
      margin-bottom: 32px;
    }

    /* Pulsing background rings for the icon */
    .pulse-ring {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid var(--accent-color);
      opacity: 0;
      animation: pulse-ring 3s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
    }

    .pulse-ring-delayed {
      animation-delay: 1.5s;
    }

    .icon-container {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 80px;
      height: 80px;
      background: rgba(0, 210, 255, 0.1);
      border: 1px solid rgba(0, 210, 255, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .icon {
      width: 40px;
      height: 40px;
      fill: var(--accent-color);
      animation: spin-slow 20s linear infinite;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .system-badge {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent-color);
      background: rgba(0, 210, 255, 0.08);
      border: 1px solid rgba(0, 210, 255, 0.2);
      padding: 6px 16px;
      border-radius: 9999px;
      margin-bottom: 24px;
      display: inline-block;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text-sub);
      margin-bottom: 32px;
    }

    .status-container {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 0.875rem;
      color: var(--text-sub);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: var(--accent-color);
      border-radius: 50%;
      animation: pulse-dot 1.5s ease-in-out infinite;
      box-shadow: 0 0 10px var(--accent-color);
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(0.6);
        opacity: 0.8;
      }
      80%, 100% {
        transform: scale(1.4);
        opacity: 0;
      }
    }

    @keyframes spin-slow {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse-dot {
      0%, 100% {
        opacity: 0.5;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.3);
      }
    }

    /* Small particles animation */
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: rgba(0, 210, 255, 0.2);
      border-radius: 50%;
      animation: float-up 8s infinite linear;
    }

    @keyframes float-up {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 0.4;
      }
      90% {
        opacity: 0.4;
      }
      100% {
        transform: translateY(-20px) scale(1);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="card">
      <div class="icon-wrapper">
        <div class="pulse-ring"></div>
        <div class="pulse-ring pulse-ring-delayed"></div>
        <div class="icon-container">
          <!-- Premium gear/wrench SVG -->
          <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
          </svg>
        </div>
      </div>

      <div class="system-badge">Preventiva 360</div>
      <h1>Manutenção em Andamento</h1>
      <p>Estamos realizando melhorias e atualizações em nossos servidores para aprimorar sua experiência. O acesso ao sistema será restabelecido em breve.</p>

      <div class="status-container">
        <div class="status-dot"></div>
        <span>Status: Atualizando banco de dados e APIs...</span>
      </div>
    </div>
  </div>

  <script>
    // Create subtle floating background particles
    const particlesContainer = document.getElementById('particles');
    const particleCount = 15;
    
    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      
      const size = Math.random() * 6 + 2;
      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;
      
      particle.style.left = `${Math.random() * 100}vw`;
      particle.style.animationDelay = `${Math.random() * 8}s`;
      particle.style.animationDuration = `${Math.random() * 6 + 6}s`;
      
      particlesContainer.appendChild(particle);
    }
  </script>
</body>
</html>
