<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Manequip 360 - Gestão Inteligente</title>



  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Noto+Sans:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />

  <!-- Flash Prevention Script -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('modo-light-dark', savedTheme);
      // Compact Mode
      const isCompact = localStorage.getItem('compact') === 'true';
      if (isCompact) document.documentElement.classList.add('compact-mode');
    })();
  </script>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0ea5e9">


  <style>
    /* CSS Variables for Theme */
    :root {
      --bg-color: #020617;
      --surface-color: #0f172a;
      --border-color: #1e293b;
      --text-main: #f8fafc;
      --text-secondary: #94a3b8;
      --primary: #0ea5e9;
      --primary-hover: #38bdf8;
    }

    [modo-light-dark="light"] {
      --bg-color: #f8fafc;
      --surface-color: #ffffff;
      --border-color: #e2e8f0;
      --text-main: #0f172a;
      --text-secondary: #64748b;
    }

    [modo-light-dark="contrast"] {
      --bg-color: #000000;
      --surface-color: #0a0a0a;
      --border-color: #27272a;
      --text-main: #fafafa;
      --text-secondary: #a1a1aa;
    }

    /* Custom scrollbar for cyberpunk feel */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0f172a;
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    .glass-panel {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(30, 41, 59, 0.7);
    }

    /* Ensure body fills screen */
    body {
      min-height: 100vh;
      background-color: var(--bg-color);
      color: var(--text-main);
    }
  </style>
</head>

<body class="font-body antialiased selection:bg-primary selection:text-white h-screen overflow-hidden">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
